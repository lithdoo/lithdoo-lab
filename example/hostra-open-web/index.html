<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hostra open web example</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        padding: 24px;
        border: 1px solid #334155;
        border-radius: 12px;
        background: #111827;
        max-width: 720px;
      }
      h1 {
        margin-top: 0;
      }
      code {
        background: #1f2937;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>hostra open web example</h1>
      <p>This page is opened via JSON-RPC <code>openWindow</code> call.</p>
    </div>
  </body>
</html>
